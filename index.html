<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Odoo Partner Qualification 360°</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@media print{
  /* Layer 3: if print is somehow triggered outside the PDF button, render a blank/blocked page */
  body *{ display:none !important; }
  body::before{
    content:"⚠ La impresión directa está deshabilitada. Usa el botón PDF dentro de la herramienta para generar el documento oficial.";
    display:block !important;
    font-family:Arial,sans-serif;
    font-size:16px;
    padding:60px;
    text-align:center;
    color:#374151;
  }
}
body{padding-bottom:140px;font-family:'Segoe UI',system-ui,sans-serif;background:#f4f0f3}
.opt-card{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 14px;border-radius:10px;border:2px solid #e5e7eb;transition:all .18s ease;user-select:none;background:white;position:relative;width:100%}
.opt-card:hover{border-color:#b08fa8;background:#fdf8fc;transform:translateY(-1px);box-shadow:0 2px 8px rgba(113,75,103,.12)}
.opt-card input[type=radio]{display:none}
.opt-card:not(.selected){border-color:#e5e7eb!important;background:white!important}
.opt-card:not(.selected):hover{border-color:#b08fa8!important;background:#fdf8fc!important}
.opt-card.na-card:not(.selected){border-color:#cbd5e1!important;background:#f8fafc!important;border-style:dashed!important}
.opt-card.na-card:not(.selected):hover{border-color:#94a3b8!important;background:#f1f5f9!important}
.opt-num{width:28px;height:28px;border-radius:50%;border:2px solid #d1d5db;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#6b7280;flex-shrink:0;transition:all .18s;background:white;margin-top:1px}
.opt-card:hover .opt-num{border-color:#714B67;color:#714B67}
.opt-card.selected{border-color:#714B67;background:#fdf4fb}
.opt-card.selected .opt-num{background:#714B67;border-color:#714B67;color:white}
.opt-card.selected .opt-label{color:#3d1f36;font-weight:600}
.opt-card.na-card{border-style:dashed;border-color:#cbd5e1;background:#f8fafc}
.opt-card.na-card.selected{border-color:#64748b;background:#e8edf2;border-style:solid}
.opt-card.na-card.selected .opt-num{background:#64748b;border-color:#64748b;color:white}
.opt-card.score-1.selected{border-color:#ef4444;background:#fff5f5}.opt-card.score-1.selected .opt-num{background:#ef4444;border-color:#ef4444}
.opt-card.score-2.selected{border-color:#f97316;background:#fff7ed}.opt-card.score-2.selected .opt-num{background:#f97316;border-color:#f97316}
.opt-card.score-3.selected{border-color:#eab308;background:#fefce8}.opt-card.score-3.selected .opt-num{background:#eab308;border-color:#eab308}
.opt-card.score-4.selected{border-color:#22c55e;background:#f0fdf4}.opt-card.score-4.selected .opt-num{background:#22c55e;border-color:#22c55e}
.opt-card.score-5.selected{border-color:#16a34a;background:#dcfce7}.opt-card.score-5.selected .opt-num{background:#16a34a;border-color:#16a34a}
.opt-label{font-size:13px;color:#374151;line-height:1.4;flex:1}
.q-card{background:white;border-radius:14px;border:1.5px solid #e9e3ee;padding:20px;margin-bottom:10px;transition:all .2s}
.q-card:hover{border-color:#c9aed8;box-shadow:0 2px 12px rgba(113,75,103,.08)}
.q-card.red-flag-row{background:#fff5f5;border-color:#fca5a5;border-left:4px solid #ef4444}
.q-card.answered-ok{border-color:#bbf7d0}
.q-num{width:26px;height:26px;border-radius:50%;background:#f3e8f0;color:#714B67;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comment-wrap{margin-top:14px;padding-top:14px;border-top:1px solid #f0e8ef}
.req-score-1{background:#fff5f5;border:2px solid #ef4444;border-radius:10px;padding:12px;margin-top:12px}
.req-score-1 .comment-label-status{color:#ef4444}
.req-score-2{background:#fff7ed;border:2px solid #f97316;border-radius:10px;padding:12px;margin-top:12px}
.req-score-2 .comment-label-status{color:#ea580c}
.req-na{background:#f1f5f9;border:2px solid #64748b;border-radius:10px;padding:12px;margin-top:12px}
.req-na .comment-label-status{color:#475569}
.req-score-1.filled,.req-score-2.filled,.req-na.filled{background:#f0fdf4;border-color:#22c55e}
.req-score-1.filled .comment-label-status,.req-score-2.filled .comment-label-status,.req-na.filled .comment-label-status{color:#16a34a}
.req-score-1.error,.req-score-2.error,.req-na.error{border-color:#dc2626}
.comment-field{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 12px;font-size:13px;resize:none;outline:none;transition:border-color .2s,box-shadow .2s;color:#374151;font-family:inherit;background:white}
.comment-field:focus{border-color:#714B67;box-shadow:0 0 0 3px rgba(113,75,103,.1)}
.comment-field.valid{border-color:#22c55e!important;box-shadow:0 0 0 2px rgba(34,197,94,.15)!important}
.comment-field.invalid{border-color:#ef4444!important;box-shadow:0 0 0 2px rgba(239,68,68,.15)!important}
.req-score-1 .comment-field:not(.valid){border-color:#ef4444;background:#fff5f5}
.req-score-2 .comment-field:not(.valid){border-color:#f97316;background:#fff7ed}
.req-na .comment-field:not(.valid){border-color:#64748b;background:#f1f5f9}
.comment-counter{font-size:11px;color:#9ca3af;text-align:right;margin-top:4px;font-weight:500}
.comment-counter.ok{color:#16a34a;font-weight:700}
.block-header{background:linear-gradient(135deg,#714B67 0%,#5a3a52 100%);color:white;padding:14px 20px;border-radius:14px 14px 0 0;cursor:pointer;user-select:none}
.block-header:hover{background:linear-gradient(135deg,#5a3a52 0%,#4a2f43 100%)}
.block-card{border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(113,75,103,.1);margin-bottom:16px}
.block-body{transition:max-height .35s ease;overflow:hidden}
.block-score-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;background:rgba(255,255,255,.2);backdrop-filter:blur(4px)}
.block-mini-bar{height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;width:80px}
.block-mini-fill{height:100%;background:rgba(255,255,255,.8);border-radius:2px;transition:width .4s}
.block-rf-pill{background:rgba(239,68,68,.35);color:#fecaca;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
#progressBar{transition:width .5s ease}
#globalProgressStrip{background:rgba(0,0,0,.15);border-top:1px solid rgba(255,255,255,.1)}
.btn-locked{opacity:.4;cursor:not-allowed!important;pointer-events:none;filter:grayscale(.4)}
.role-pill-recruiter{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.role-pill-pm{background:#ede9fe;color:#5b21b6;border:1px solid #ddd6fe}
.role-pill-ambos{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.type-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px}
.type-core{background:#dbeafe;color:#1e40af}
.type-maturity{background:#ede9fe;color:#5b21b6}
.type-aspiration{background:#fef9c3;color:#713f12}
#resultsSummary{transition:all .3s}
.score-ring{width:90px;height:90px;border-radius:50%;border:6px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(255,255,255,.1)}
#autosaveBadge{transition:opacity .5s}
.na-required-note{display:flex;align-items:center;gap:6px;font-size:11px;color:#92400e;font-weight:600;background:#fef3c7;border:1px solid #fde68a;border-radius:6px;padding:5px 10px;margin-bottom:8px}
</style>
</head>
<body>

<header class="bg-[#714B67] text-white shadow-lg sticky top-0 z-20 no-print">
  <div class="max-w-7xl mx-auto px-4 py-3">
    <div class="flex items-center justify-between gap-3 flex-wrap">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center text-lg">🎯</div>
        <div>
          <h1 class="text-sm font-bold tracking-tight leading-none">Odoo Partner Qualification 360°</h1>
          <p class="text-xs opacity-60 mt-0.5" id="headerSubtitle"></p>
        </div>
        <span id="autosaveBadge" class="text-xs opacity-0 bg-white/20 px-2 py-0.5 rounded-full flex items-center gap-1">💾 <span id="autosaveText"></span></span>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        <button id="langToggle" class="px-3 py-1.5 bg-white/20 rounded-lg hover:bg-white/30 transition font-semibold text-xs flex items-center gap-1">🌐 <span id="langText">ES</span></button>
        <div class="flex items-center gap-1.5 bg-white/10 rounded-lg px-3 py-1.5 border border-white/10">
          <span class="text-xs opacity-60" id="labelType"></span>
          <span id="badgeType" class="font-bold text-sm">—</span>
        </div>
        <div class="flex items-center gap-1.5 bg-white/10 rounded-lg px-3 py-1.5 border border-white/10">
          <span class="text-xs opacity-60" id="labelSubcat"></span>
          <span id="badgeSubcat" class="font-semibold text-xs">—</span>
        </div>
        <div class="flex items-center gap-1.5 bg-white/10 rounded-lg px-3 py-1.5 border border-white/10">
          <span class="text-xs opacity-60" id="labelScore"></span>
          <span id="badgeScore" class="font-bold text-base">—</span>
          <span class="text-xs opacity-40">/5</span>
        </div>
        <div class="flex items-center gap-1 bg-red-500/20 rounded-lg px-3 py-1.5 border border-red-400/20">
          <span>🚩</span><span id="badgeRF" class="font-bold">0</span>
          <span class="text-xs opacity-60" id="flagsLabel"></span>
        </div>
      </div>
    </div>
  </div>
  <div id="globalProgressStrip" class="px-4 py-2">
    <div class="max-w-7xl mx-auto flex items-center gap-3">
      <div class="flex-1 bg-white/15 rounded-full h-2 overflow-hidden">
        <div id="progressBar" class="h-full bg-white rounded-full" style="width:0%"></div>
      </div>
      <span id="progressText" class="text-xs font-semibold text-white/70 whitespace-nowrap min-w-[70px] text-right"></span>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-6">
  <section class="bg-white rounded-2xl shadow-sm border border-purple-100 p-5 mb-6">
    <h2 class="text-sm font-bold text-[#714B67] uppercase tracking-wider mb-4 flex items-center gap-2">
      <span class="w-5 h-5 bg-[#714B67] rounded-md flex items-center justify-center text-white text-xs">📋</span>
      <span id="sectionInfoTitle"></span>
    </h2>
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1.5" id="labelPartnerName"></label>
        <input id="partnerName" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:ring-0 focus:border-[#714B67] outline-none transition" placeholder="ej. ERP Mexico"/>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1.5" id="labelPartnerManager"></label>
        <input id="partnerManager" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:ring-0 focus:border-[#714B67] outline-none transition" placeholder="ej. Alnu"/>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1.5" id="labelRoleMode"></label>
        <select id="roleMode" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:ring-0 focus:border-[#714B67] outline-none transition bg-white">
          <option value="all" id="optAll"></option>
          <option value="Recruiter" id="optRecruiter"></option>
          <option value="PM" id="optPM"></option>
        </select>
      </div>
      <div>
        <label class="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1.5" id="labelSearch"></label>
        <input id="searchBox" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:ring-0 focus:border-[#714B67] outline-none transition"/>
      </div>
    </div>
    <div class="mt-4 grid sm:grid-cols-2 gap-3">
      <div class="flex items-start gap-2.5 bg-blue-50 border border-blue-100 rounded-xl p-3">
        <span class="text-blue-500 mt-0.5 flex-shrink-0">💡</span>
        <p class="text-xs text-blue-700"><strong id="noteLabel"></strong> <span id="noteText"></span></p>
      </div>
      <div class="flex items-start gap-2.5 bg-amber-50 border border-amber-200 rounded-xl p-3">
        <span class="text-amber-500 mt-0.5 flex-shrink-0">✍️</span>
        <p class="text-xs text-amber-800"><strong id="mandatoryCommentsLabel"></strong> <span id="mandatoryCommentsText"></span></p>
      </div>
    </div>
  </section>

  <section id="resultsSummary" class="hidden mb-6">
    <div class="bg-gradient-to-br from-[#714B67] via-[#5a3a52] to-[#3d2038] text-white rounded-2xl shadow-xl p-6">
      <div class="grid md:grid-cols-5 gap-6">
        <div class="md:col-span-2 flex items-center gap-5">
          <div class="score-ring flex-shrink-0">
            <span class="text-3xl font-black" id="displayScore">—</span>
            <span class="text-xs opacity-60 font-semibold">/5.0</span>
          </div>
          <div>
            <p class="text-xs opacity-60 uppercase tracking-wider mb-1" id="resultsTitle"></p>
            <p class="text-2xl font-black" id="displayCategory">—</p>
            <p class="text-sm opacity-75 font-semibold mt-0.5" id="displaySubcategory">—</p>
            <div class="mt-3 bg-white/20 rounded-full h-2 w-full overflow-hidden">
              <div id="scoreBar" class="h-full bg-white rounded-full transition-all duration-700" style="width:0%"></div>
            </div>
          </div>
        </div>
        <div class="md:col-span-3">
          <p class="text-xs opacity-60 uppercase tracking-wider mb-3" id="blockScoresTitle"></p>
          <div id="blockScoresList" class="space-y-1.5 text-xs"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="exportBlockerBanner" class="hidden mb-4">
    <div class="bg-amber-50 border-2 border-amber-300 rounded-2xl p-4 flex items-start gap-3">
      <div class="w-8 h-8 bg-amber-100 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5">⚠️</div>
      <div>
        <p class="text-sm font-bold text-amber-900" id="blockerTitle"></p>
        <p class="text-xs text-amber-700 mt-1" id="blockerDetail"></p>
      </div>
    </div>
  </div>

  <div id="printBlockToast" class="hidden fixed top-4 right-4 z-50 bg-red-600 text-white px-4 py-3 rounded-xl shadow-2xl text-sm font-semibold max-w-sm no-print"></div>

  <section id="formRoot" class="space-y-0"></section>
</main>

<footer class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-purple-100 shadow-xl z-20 no-print">
  <div class="max-w-7xl mx-auto px-4 py-3">
    <div class="flex flex-col md:flex-row justify-between items-center gap-2">
      <div class="flex items-center gap-4 text-sm">
        <span class="flex items-center gap-1.5">
          <strong id="footerLabelTotal" class="text-gray-500 text-xs uppercase"></strong>
          <span id="footerScore" class="text-[#714B67] font-black text-lg">—</span>
          <span class="text-gray-300 text-xs">/5.0</span>
        </span>
        <span class="text-gray-200 hidden sm:block">|</span>
        <span class="hidden sm:flex items-center gap-1.5">
          <strong id="footerLabelType" class="text-gray-500 text-xs uppercase"></strong>
          <span id="footerType" class="font-bold text-gray-700">—</span>
        </span>
        <span class="text-gray-200 hidden sm:block">|</span>
        <span class="flex items-center gap-1">🚩 <span id="footerRF" class="text-red-500 font-bold">0</span> <span id="footerRFLabel" class="text-gray-400 text-xs"></span></span>
      </div>
      <div class="flex gap-2">
        <button id="btnClear" class="px-3 py-2 border-2 border-gray-200 rounded-xl hover:bg-gray-50 text-sm font-bold text-gray-500 transition flex items-center gap-1.5">🗑️ <span id="btnClearText"></span></button>
        <button id="btnXLSX" class="px-4 py-2 bg-emerald-50 text-emerald-800 border-2 border-emerald-200 rounded-xl hover:bg-emerald-100 text-sm font-bold transition flex items-center gap-1.5">📊 Excel</button>
        <button id="btnPDF" class="px-5 py-2 bg-[#714B67] text-white rounded-xl hover:bg-[#5a3a52] text-sm font-bold transition shadow-md flex items-center gap-1.5">📄 PDF</button>
      </div>
    </div>
    <p id="footerBlockMsg" class="text-center text-xs mt-1.5 text-amber-600 font-semibold hidden"></p>
    <div id="footerBlockDetail" class="hidden mt-2 max-h-40 overflow-y-auto bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-800"></div>
  </div>
</footer>

<!-- PDF EXPORT AREA -->
<section id="pdfArea" class="hidden p-6" style="font-family:Arial,sans-serif">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
    <div style="width:40px;height:40px;background:#714B67;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px">🎯</div>
    <div>
      <h2 style="color:#714B67;font-size:18px;font-weight:bold;margin:0">Odoo Partner Qualification 360°</h2>
      <p style="font-size:10px;color:#888;margin:2px 0 0"><span id="pdfGenerated"></span> <span id="pdfDate"></span></p>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
    <div style="background:#f8f4f7;padding:10px;border-radius:8px;border:1px solid #e9e3ee">
      <p style="font-size:9px;color:#714B67;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;margin:0 0 3px" id="pdfLabelPartner">Partner</p>
      <p style="font-size:13px;font-weight:bold;margin:0" id="pdfPartner"></p>
    </div>
    <div style="background:#f8f4f7;padding:10px;border-radius:8px;border:1px solid #e9e3ee">
      <p style="font-size:9px;color:#714B67;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;margin:0 0 3px" id="pdfLabelSalesperson">Salesperson</p>
      <p style="font-size:13px;font-weight:bold;margin:0" id="pdfPM"></p>
    </div>
    <div style="background:#714B67;padding:10px;border-radius:8px">
      <p style="font-size:9px;color:rgba(255,255,255,.7);font-weight:bold;text-transform:uppercase;letter-spacing:.5px;margin:0 0 3px">Score</p>
      <p style="font-size:20px;font-weight:900;color:white;margin:0"><span id="pdfScore"></span>/5.0</p>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
    <div style="background:#fdf4fb;padding:8px;border-radius:8px;border:1px solid #e9cce4">
      <p style="font-size:9px;color:#714B67;font-weight:bold;margin:0 0 2px" id="pdfLabelCategory"></p>
      <p style="font-size:12px;font-weight:bold;margin:0" id="pdfType"></p>
    </div>
    <div style="background:#fdf4fb;padding:8px;border-radius:8px;border:1px solid #e9cce4">
      <p style="font-size:9px;color:#714B67;font-weight:bold;margin:0 0 2px" id="pdfLabelSubcat"></p>
      <p style="font-size:11px;font-weight:bold;margin:0" id="pdfSubcat"></p>
    </div>
    <div style="background:#fff5f5;padding:8px;border-radius:8px;border:1px solid #fecaca">
      <p style="font-size:9px;color:#dc2626;font-weight:bold;margin:0 0 2px" id="pdfLabelRF"></p>
      <p style="font-size:16px;font-weight:900;color:#dc2626;margin:0" id="pdfRF"></p>
    </div>
  </div>
  <h3 style="font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#714B67;margin-bottom:8px" id="pdfDetailedTitle"></h3>
  <table style="width:100%;font-size:9px;border-collapse:collapse;margin-bottom:16px">
    <thead><tr style="background:#714B67;color:white" id="pdfTableHead"></tr></thead>
    <tbody id="pdfBody"></tbody>
  </table>
  <div style="page-break-before:always">
    <h3 style="color:#714B67;font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px" id="pdfWeightTitle"></h3>
    <p style="font-size:9px;color:#666;margin-bottom:10px" id="pdfWeightSubtitle"></p>
    <div id="pdfWeightSummary"></div>
  </div>
</section>

<script>
// ── LANGUAGE SYSTEM ───────────────────────────────────────────────
const LANGS = ['es','en','fr'];
let currentLang = 'es';

// Block name translation map (data key → display label per lang)
// Keys are the internal b-values used in Q[].b
const BLOCK_LABELS = {
  'PR Quick Profiling':       { es:'PR Quick Profiling',              en:'PR Quick Profiling',                    fr:'PR Quick Profiling'                     },
  'Estructura & Equipo':      { es:'Estructura & Equipo',             en:'Structure & Team',                      fr:'Structure & Équipe'                     },
  'Comerciales':              { es:'Comerciales',                     en:'Commercial',                            fr:'Commercial'                             },
  'Técnicas':                 { es:'Técnicas',                        en:'Technical',                             fr:'Technique'                              },
  'Delivery & CS':            { es:'Delivery & CS',                   en:'Delivery & CS',                         fr:'Delivery & CS'                          },

// ── HELPERS ───────────────────────────────────────────────────────
const MIN_CHARS = 15;
let autosaveTimer = null;

function L(key)         { return (LANG[currentLang]||LANG.es)[key] ?? (LANG.es[key] ?? ''); }
function Lfn(key,...args){ const fn=(LANG[currentLang]||LANG.es)[key]; return typeof fn==='function'?fn(...args):''; }
function qText(q)       { return q[currentLang] || q.es; }
function optText(arr)   { return currentLang==='fr'?arr[2]:currentLang==='en'?arr[1]:arr[0]; }
function isNAOpt(arr)   { return arr[0].trim().toUpperCase().startsWith('N/A'); }
function getReqClass(v) { if(!v)return ''; if(v==='NA')return 'req-na'; const n=parseInt(v); if(n===1)return 'req-score-1'; if(n===2)return 'req-score-2'; return ''; }
function roleLabel(r)   { return r==='Recruiter'?L('roleRecruiter'):r==='PM'?L('rolePM'):L('roleBoth'); }

function isCommentRequired(qDiv, v) {
  if(v==='NA') return qDiv.dataset.naRequired==='true';
  const n=parseInt(v); return !isNaN(n)&&n<=2;
}
function validateComment(text) {
  const t=text.trim();
  if(t.length<MIN_CHARS) return 'short';
  if(new Set(t.replace(/\s/g,'')).size<=2) return 'filler';
  const words=t.toLowerCase().split(/\s+/).filter(w=>w.length>1);
  if(words.length<3) return 'short';
  if(words.length>=4&&new Set(words).size<=2) return 'filler';
  return 'ok';
}
function getCommentIssues() {
  let pending=0,invalid=0;
  const pendingList=[],invalidList=[];
  const mode=document.getElementById('roleMode').value;
  document.querySelectorAll('[data-qid]').forEach(qDiv=>{
    const role=qDiv.dataset.role;
    const inRoleScope=(mode==='all')||(mode==='Recruiter'&&(role==='Recruiter'||role==='Ambos'))||(mode==='PM'&&(role==='PM'||role==='Ambos'));
    if(!inRoleScope) return;
    const sel=qDiv.querySelector('input[type="radio"]:checked');
    if(!sel||!isCommentRequired(qDiv,sel.value)) return;
    const s=validateComment((qDiv.querySelector('textarea')||{value:''}).value);
    const entry={num:qDiv.dataset.qnum, qid:qDiv.dataset.qid, text:qDiv.querySelector('.question-text').textContent};
    if(s==='short'){pending++;pendingList.push(entry);}
    else if(s==='filler'){invalid++;invalidList.push(entry);}
  });
  return {pending,invalid,pendingList,invalidList};
}

// ── AUTOSAVE ──────────────────────────────────────────────────────
function autosave() {
  try {
    const data={partnerName:document.getElementById('partnerName').value,partnerManager:document.getElementById('partnerManager').value,roleMode:document.getElementById('roleMode').value,lang:currentLang,answers:{},comments:{}};
    document.querySelectorAll('[data-qid]').forEach(qDiv=>{
      const qid=qDiv.dataset.qid,sel=qDiv.querySelector('input[type="radio"]:checked'),ta=qDiv.querySelector('textarea');
      if(sel) data.answers[qid]=sel.value;
      if(ta&&ta.value) data.comments[qid]=ta.value;
    });
    localStorage.setItem('oq360_autosave',JSON.stringify(data));
    const badge=document.getElementById('autosaveBadge');
    badge.style.opacity='1'; setTimeout(()=>badge.style.opacity='0',2000);
  } catch(e){}
}
function loadAutosave() { try{const r=localStorage.getItem('oq360_autosave');return r?JSON.parse(r):null;}catch(e){return null;} }
function scheduleAutosave() { clearTimeout(autosaveTimer); autosaveTimer=setTimeout(autosave,1500); }

// ── RENDER FORM ───────────────────────────────────────────────────
function renderForm(savedData) {
  const root=document.getElementById('formRoot');
  const savedAnswers=savedData?savedData.answers:{};
  const savedComments=savedData?savedData.comments:{};
  root.innerHTML='';
  const grouped={};
  Q.forEach(q=>{if(!grouped[q.b])grouped[q.b]=[];grouped[q.b].push(q);});
  const totalW=Q.reduce((s,q)=>s+q.w,0);
  const blockWeights={};
  Q.forEach(q=>{blockWeights[q.b]=(blockWeights[q.b]||0)+q.w;});
  let globalQIdx=0;

  Object.entries(grouped).forEach(([block,list])=>{
    const blockPct=Math.round((blockWeights[block]||0)/totalW*100);
    const blockDisplay=bLabel(block);
    const card=document.createElement('div'); card.className='block-card';

    const hdr=document.createElement('div'); hdr.className='block-header';
    hdr.innerHTML=`<div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="font-bold text-sm">${blockDisplay}</span>
        <span class="text-xs bg-white/20 px-2 py-0.5 rounded-full" data-block-prog="${block}">0/${list.length}</span>
        <span class="block-rf-pill hidden" data-block-rf="${block}"></span>
      </div>
      <div class="flex items-center gap-3">
        <div><div class="block-mini-bar"><div class="block-mini-fill" data-block-fill="${block}" style="width:0%"></div></div></div>
        <span class="block-score-pill" data-block-score="${block}">—</span>
        <span class="text-xs opacity-50">${blockPct}%</span>
        <span class="toggle-icon text-white/50 text-lg font-light">▲</span>
      </div>
    </div>`;
    hdr.addEventListener('click',()=>{
      const body=card.querySelector('.block-body'),icon=hdr.querySelector('.toggle-icon');
      const isOpen=body.style.maxHeight!=='0px'&&body.style.maxHeight!=='';
      body.style.maxHeight=isOpen?'0px':(body.scrollHeight+200)+'px';
      icon.textContent=isOpen?'▼':'▲';
    });
    card.appendChild(hdr);

    const body=document.createElement('div'); body.className='block-body'; body.style.maxHeight='9999px';
    const inner=document.createElement('div'); inner.className='p-4 space-y-2';

    list.forEach((q,idx)=>{
      globalQIdx++;
      const qId=`q_${block.replace(/\s+/g,'_')}_${idx}`;
      const question=qText(q);
      const isMorA=q.t==='maturity'||q.t==='aspiration';
      const hasNA=isMorA&&isNAOpt(q.o[0]);
      const savedAns=savedAnswers[qId],savedCom=savedComments[qId]||'';
      const naReq=q.naRequired===true;

      const qDiv=document.createElement('div'); qDiv.className='q-card';
      qDiv.dataset.role=q.r; qDiv.dataset.weight=q.w; qDiv.dataset.block=block;
      qDiv.dataset.qid=qId; qDiv.dataset.qtype=q.t; qDiv.dataset.naRequired=naReq?'true':'false';
      qDiv.dataset.qnum=globalQIdx;

      const roleCls=q.r==='Recruiter'?'role-pill-recruiter':q.r==='PM'?'role-pill-pm':'role-pill-ambos';
      const rLabel=roleLabel(q.r);
      const typeCls=`type-${q.t}`;
      const typeLabel=q.t==='core'?L('typeCore'):q.t==='maturity'?L('typeMaturity'):L('typeAspiration');

      let optHTML='';
      if(hasNA){
        const naRaw=optText(q.o[0]);
        const naClean=naRaw.replace(/^N\/A\s*[–\-:]\s*/i,'');
        const naChk=savedAns==='NA';
        optHTML+=`<label class="opt-card na-card${naChk?' selected':''}" data-val="NA">
          <input type="radio" name="${qId}" value="NA"${naChk?' checked':''}/>
          <div class="opt-num" style="font-size:10px;width:32px;height:32px">N/A</div>
          <div class="opt-label" style="color:#64748b;font-style:italic">${naClean}</div></label>`;
        for(let i=1;i<=5;i++){
          const txt=optText(q.o[i]);
          optHTML+=`<label class="opt-card score-${i}${savedAns==i?' selected':''}">
            <input type="radio" name="${qId}" value="${i}"${savedAns==i?' checked':''}/>
            <div class="opt-num">${i}</div><div class="opt-label">${txt}</div></label>`;
        }
      } else {
        for(let i=0;i<5;i++){
          const txt=optText(q.o[i]);const val=i+1;
          optHTML+=`<label class="opt-card score-${val}${savedAns==val?' selected':''}">
            <input type="radio" name="${qId}" value="${val}"${savedAns==val?' checked':''}/>
            <div class="opt-num">${val}</div><div class="opt-label">${txt}</div></label>`;
        }
      }

      const needsCommentNow=savedAns?isCommentRequired(qDiv,savedAns):false;
      const commentStatus=needsCommentNow&&savedCom?validateComment(savedCom):null;
      const reqCls=getReqClass(savedAns);
      const cwCls=needsCommentNow?('comment-wrap '+reqCls+(commentStatus==='ok'?' filled':commentStatus?' error':'')):'comment-wrap';
      const naNote=naReq?`<div class="na-required-note">${L('naRequiredNote')}</div>`:'';
      const clHtml=needsCommentNow
        ?`<span class="comment-label-status font-bold">✱</span> ${L('commentLabel')} <span class="comment-label-status text-xs font-bold">${L('commentMandatory')}</span>`
        :`${L('commentLabel')} <span class="text-gray-400 text-xs font-normal">${L('commentOptional')}</span>`;

      qDiv.innerHTML=`
        <div class="flex items-start gap-3 mb-3">
          <div class="q-num flex-shrink-0 mt-0.5">${globalQIdx}</div>
          <div class="flex-1">
            <div class="flex flex-wrap items-center gap-2 mb-2">
              <span class="type-badge ${typeCls}">${typeLabel}</span>
              <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-bold border ${roleCls}">${rLabel}</span>
              <span class="text-xs text-gray-400 font-medium">${L('weightLabel')}: ${q.w}</span>
            </div>
            <p class="text-sm font-semibold text-gray-800 question-text leading-snug">${question}</p>
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2 options-grid">${optHTML}</div>
        <div class="${cwCls}" id="cwrap_${qId}">
          ${(needsCommentNow&&savedAns==='NA')?naNote:''}
          <div class="flex items-center justify-between mb-1.5">
            <label class="text-xs font-bold text-gray-600 flex items-center gap-1.5">${clHtml}</label>
            <span class="comment-counter${savedCom.length>=MIN_CHARS?' ok':''}" id="ctr_${qId}">${savedCom.length} / ${MIN_CHARS}</span>
          </div>
          <textarea id="comment_${qId}" rows="2" class="comment-field${commentStatus==='ok'?' valid':commentStatus?' invalid':''}"
            placeholder="${L('commentsPlaceholder')}">${savedCom}</textarea>
          <p class="comment-msg text-xs text-red-500 mt-1 font-medium hidden" id="cmsg_${qId}"></p>
        </div>`;
      inner.appendChild(qDiv);
    });
    body.appendChild(inner); card.appendChild(body); root.appendChild(card);
  });

  // Bind radio events
  document.querySelectorAll('input[type="radio"]').forEach(r=>{
    r.addEventListener('change',e=>{
      const name=e.target.name;
      document.querySelectorAll(`input[name="${name}"]`).forEach(inp=>inp.closest('.opt-card').classList.toggle('selected',inp.checked));
      const qDiv=e.target.closest('[data-qid]');
      if(qDiv){
        const v=e.target.value,qId=qDiv.dataset.qid,needs=isCommentRequired(qDiv,v);
        refreshCommentWrap(qDiv,qId,needs,v);
        if(needs){const ta=qDiv.querySelector('textarea');if(ta&&ta.value)validateAndStyleComment(qDiv,qId,ta.value);}
        else clearCommentStyle(qId);
        qDiv.classList.remove('answered-ok','red-flag-row');
        if(v==='NA') qDiv.classList.add('answered-ok');
        else{const n=parseInt(v);if(n<=2)qDiv.classList.add('red-flag-row');else qDiv.classList.add('answered-ok');}
      }
      recalculate(); scheduleAutosave();
    });
  });

  // Bind textarea events
  document.querySelectorAll('textarea').forEach(ta=>{
    const m=ta.id.match(/^comment_(.+)$/); if(!m) return;
    const qId=m[1];
    ta.addEventListener('input',()=>{
      const ctr=document.getElementById(`ctr_${qId}`);
      if(ctr){ctr.textContent=`${ta.value.length} / ${MIN_CHARS}`;ctr.className='comment-counter'+(ta.value.length>=MIN_CHARS?' ok':'');}
      const qDiv=ta.closest('[data-qid]'),sel=qDiv&&qDiv.querySelector('input[type="radio"]:checked');
      if(sel&&isCommentRequired(qDiv,sel.value)) validateAndStyleComment(qDiv,qId,ta.value);
      else clearCommentStyle(qId);
      scheduleAutosave(); updateExportState();
    });
  });

  // Apply saved styles
  document.querySelectorAll('[data-qid]').forEach(qDiv=>{
    const sel=qDiv.querySelector('input[type="radio"]:checked'); if(!sel) return;
    const n=parseInt(sel.value);
    if(sel.value==='NA') qDiv.classList.add('answered-ok');
    else if(n<=2) qDiv.classList.add('red-flag-row');
    else qDiv.classList.add('answered-ok');
  });
}

function refreshCommentWrap(qDiv,qId,needsNow,v){
  const wrap=document.getElementById(`cwrap_${qId}`); if(!wrap) return;
  const naReq=qDiv.dataset.naRequired==='true';
  if(needsNow){
    wrap.className='comment-wrap '+getReqClass(v);
    const lbl=wrap.querySelector('label');
    if(lbl) lbl.innerHTML=`<span class="comment-label-status font-bold">✱</span> ${L('commentLabel')} <span class="comment-label-status text-xs font-bold">${L('commentMandatory')}</span>`;
    const note=wrap.querySelector('.na-required-note'); if(note) note.remove();
    if(v==='NA'&&naReq) wrap.insertAdjacentHTML('afterbegin',`<div class="na-required-note">${L('naRequiredNote')}</div>`);
  } else {
    wrap.className='comment-wrap';
    const lbl=wrap.querySelector('label');
    if(lbl) lbl.innerHTML=`${L('commentLabel')} <span class="text-gray-400 text-xs font-normal">${L('commentOptional')}</span>`;
    const note=wrap.querySelector('.na-required-note'); if(note) note.remove();
  }
  const ta=wrap.querySelector('textarea'); if(ta) ta.placeholder=L('commentsPlaceholder');
}

function validateAndStyleComment(qDiv,qId,text){
  const status=validateComment(text);
  const ta=document.getElementById(`comment_${qId}`),wrap=document.getElementById(`cwrap_${qId}`),msg=document.getElementById(`cmsg_${qId}`);
  if(ta){ta.classList.remove('valid','invalid');ta.classList.add(status==='ok'?'valid':'invalid');}
  if(wrap){
    wrap.classList.remove('filled','error'); wrap.classList.add(status==='ok'?'filled':'error');
    const lbl=wrap.querySelector('label');
    if(lbl) lbl.innerHTML=status==='ok'
      ?`<span class="comment-label-status font-bold">✓</span> ${L('commentLabel')} <span class="comment-label-status text-xs font-bold">${L('commentCompleted')}</span>`
      :`<span class="comment-label-status font-bold">✱</span> ${L('commentLabel')} <span class="comment-label-status text-xs font-bold">${L('commentMandatory')}</span>`;
  }
  if(msg){
    if(status==='short'){msg.textContent=L('commentTooShort');msg.classList.remove('hidden');}
    else if(status==='filler'){msg.textContent=L('commentInvalid');msg.classList.remove('hidden');}
    else{msg.textContent='';msg.classList.add('hidden');}
  }
  return status;
}

function clearCommentStyle(qId){

}

// ── RECALCULATE ───────────────────────────────────────────────────
function recalculate(){
  applyFilters();
  const mode=document.getElementById('roleMode').value;
  let totalScore=0,totalWeight=0,redFlags=0,answered=false,answeredCount=0,totalVisible=0;
  const blockScores={};

  document.querySelectorAll('#formRoot .block-card').forEach(card=>{
    const bEl=card.querySelector('[data-block-prog]'),block=bEl?bEl.dataset.blockProg:'';
    let bTotal=0,bWeight=0,bAnswered=0,bRF=0,bVisible=0;
    card.querySelectorAll('[data-qid]').forEach(qDiv=>{
      if(qDiv.classList.contains('hidden')) return;
      const role=qDiv.dataset.role,weight=parseFloat(qDiv.dataset.weight);
      const sel=qDiv.querySelector('input[type="radio"]:checked');
      const shouldCount=(mode==='all')||(mode==='Recruiter'&&(role==='Recruiter'||role==='Ambos'))||(mode==='PM'&&(role==='PM'||role==='Ambos'));
      bVisible++; totalVisible++;
      if(sel){
        answeredCount++; bAnswered++;
        if(shouldCount&&sel.value!=='NA'){
          answered=true;
          const num=parseInt(sel.value),ws=(num/5)*weight;
          totalScore+=ws; totalWeight+=weight; bTotal+=ws; bWeight+=weight;
          if(num<=2){redFlags++;bRF++;qDiv.classList.add('red-flag-row');qDiv.classList.remove('answered-ok');}
          else qDiv.classList.remove('red-flag-row');
        }
      }
    });
    const progBadge=card.querySelector('[data-block-prog]');
    if(progBadge) progBadge.textContent=`${bAnswered}/${bVisible}`;
    const rfBadge=card.querySelector('[data-block-rf]');
    if(rfBadge){if(bRF>0){rfBadge.textContent=`🚩 ${bRF}`;rfBadge.classList.remove('hidden');}else rfBadge.classList.add('hidden');}
    const bScore=bWeight>0?(bTotal/bWeight)*5:0;
    if(bWeight>0) blockScores[block]=bScore;
    const pill=card.querySelector('[data-block-score]');
    if(pill){
      if(bWeight>0){
        const pc=bScore>=4?'#86efac':bScore>=3?'#fde68a':bScore>=2?'#fed7aa':'#fecaca';
        const tc=bScore>=4?'#14532d':bScore>=3?'#713f12':bScore>=2?'#7c2d12':'#7f1d1d';
        pill.textContent=bScore.toFixed(1); pill.style.background=pc; pill.style.color=tc;
      } else {pill.textContent='—';pill.style.background='';pill.style.color='';}
    }
    const fill=card.querySelector('[data-block-fill]');
    if(fill) fill.style.width=(bWeight>0?(bScore/5*100).toFixed(0):0)+'%';
  });

  document.getElementById('progressBar').style.width=(totalVisible>0?Math.round(answeredCount/totalVisible*100):0)+'%';
  document.getElementById('progressText').textContent=Lfn('progressLabel',answeredCount,totalVisible);

  if(totalWeight>0) totalScore=(totalScore/totalWeight)*5;
  const cats=L('categories');
  let catKey='LowFit';
  if(totalScore>=4.3) catKey='Strategic';
  else if(totalScore>=3.6) catKey='Growth';
  else if(totalScore>=2.9) catKey='Active';
  const category=cats[catKey]||catKey;
  const subcatKey=getSubcategory(totalScore,catKey,blockScores,redFlags);
  const subcatDisplay=(L('subcats')||{})[subcatKey]||subcatKey;

  document.getElementById('badgeType').textContent=answered?category:'—';
  document.getElementById('badgeSubcat').textContent=answered?subcatDisplay:'—';
  document.getElementById('badgeScore').textContent=answered?totalScore.toFixed(2):'—';
  document.getElementById('badgeRF').textContent=redFlags;
  document.getElementById('footerScore').textContent=answered?totalScore.toFixed(2):'—';
  document.getElementById('footerType').textContent=answered?category:'—';
  document.getElementById('footerRF').textContent=redFlags;

  if(answered){
    document.getElementById('resultsSummary').classList.remove('hidden');
    document.getElementById('displayScore').textContent=totalScore.toFixed(2);
    document.getElementById('displayCategory').textContent=category;
    document.getElementById('displaySubcategory').textContent=subcatDisplay;
    document.getElementById('scoreBar').style.width=(totalScore/5*100).toFixed(1)+'%';
    const bList=document.getElementById('blockScoresList'); bList.innerHTML='';
    Object.entries(blockScores).forEach(([b,s])=>{
      const p=(s/5*100).toFixed(0),color=s>=4?'#22c55e':s>=3?'#eab308':s>=2?'#f97316':'#ef4444';
      bList.innerHTML+=`<div class="flex items-center gap-2">
        <span class="text-white/60 truncate flex-1" style="font-size:10px">${bLabel(b)}</span>
        <div style="width:60px;height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden">
          <div style="width:${p}%;height:100%;background:${color};border-radius:3px"></div></div>
        <span style="font-size:11px;font-weight:700;color:${color};min-width:28px;text-align:right">${s.toFixed(1)}</span>
      </div>`;
    });
  } else document.getElementById('resultsSummary').classList.add('hidden');
  updateExportState();
}

function getSubcategory(score,catKey,bs,rf){
  const E=bs['Estructura & Equipo']||0,C=bs['Comerciales']||0,K=bs['Compromiso']||0,
        R=bs['Clientes & Retención']||0,P=bs['PR Quick Profiling']||0,D=bs['Delivery & CS']||0;
  if(catKey==='Strategic'){if(score>=4.6&&K>=4.5&&R>=4.5)return 'Flagship';if(E>=4.5&&R>=4.0&&rf===0)return 'Established';return 'Transforming';}
  if(catKey==='Growth'){if(C>=4.0)return 'Vertical';if(E>=3.5&&C>=3.5)return 'Expanding';return 'Broad';}
  if(catKey==='Active'){if(score>=3.3&&K>=3.0)return 'Emerging';if(rf>=3||R<2.5)return 'AtRisk';return 'Transactional';}
  if(P<2.0)return 'EndUser';if(D<2.0)return 'Community';if(K<1.5)return 'Inactive';return 'Dormant';
}

// ── EXPORT STATE ──────────────────────────────────────────────────
function updateExportState(){
  const score=document.getElementById('footerScore').textContent;
  const partner=document.getElementById('partnerName').value.trim();
  const pm=document.getElementById('partnerManager').value.trim();
  const issues=getCommentIssues();
  // Count ALL visible questions regardless of role filter; track exact question numbers
  let unanswered=0;
  const pendingQuestions=[]; // {num, qid, text}
  document.querySelectorAll('[data-qid]:not(.hidden)').forEach(qDiv=>{
    if(!qDiv.querySelector('input[type="radio"]:checked')){
      unanswered++;
      const num=qDiv.dataset.qnum;
      const text=qDiv.querySelector('.question-text').textContent;
      pendingQuestions.push({num, qid:qDiv.dataset.qid, text});
    }
  });
  const noScore=score==='—',noMeta=!partner||!pm;
  const blocked=issues.pending+issues.invalid+unanswered+(noMeta?1:0)+(noScore?1:0)>0;
  document.getElementById('btnPDF').classList.toggle('btn-locked',blocked);
  document.getElementById('btnXLSX').classList.toggle('btn-locked',blocked);
      document.getElementById('exportBlockerBanner').classList.toggle('hidden',!blocked);
  document.getElementById('footerBlockMsg').classList.toggle('hidden',!blocked);
  document.getElementById('footerBlockDetail').classList.toggle('hidden',!blocked);
  const detailEl=document.getElementById('blockerDetail');
  const footerDetailEl=document.getElementById('footerBlockDetail');
  if(blocked){
    const parts=[];
    if(noMeta) parts.push(L('blockerMissingMeta'));
    if(noScore) parts.push(L('blockerNoScore'));
    if(unanswered>0) parts.push(Lfn('blockerUnanswered',unanswered));
    if(issues.pending>0) parts.push(Lfn('blockerPending',issues.pending));
    if(issues.invalid>0) parts.push(Lfn('blockerFiller',issues.invalid));
    const summaryMsg=parts.join(' · ');
    document.getElementById('footerBlockMsg').textContent=`⚠️ ${summaryMsg}`;

    // Build the same detailed clickable list in both the top banner and the footer panel
    function buildJumpListsInto(container){
      container.innerHTML='';
      function appendJumpList(titleKey, entries){
        if(entries.length===0) return;
        const t=document.createElement('p');
        t.className='font-bold mt-2 mb-1';
        t.textContent=L(titleKey);
        container.appendChild(t);
        const ul=document.createElement('ul');
        ul.className='list-none space-y-1';
        entries.forEach(e=>{
          const li=document.createElement('li');
          const btn=document.createElement('button');
          btn.type='button';
          btn.className='text-amber-800 hover:text-amber-950 underline text-left';
          btn.dataset.jumpQid=e.qid;
          btn.textContent=`#${e.num} — ${e.text}`;
          li.appendChild(btn);
          ul.appendChild(li);
        });
        container.appendChild(ul);
      }
      appendJumpList('blockerUnansweredList', pendingQuestions);
      appendJumpList('blockerPendingList', issues.pendingList);
      appendJumpList('blockerFillerList', issues.invalidList);
      container.querySelectorAll('[data-jump-qid]').forEach(btn=>{
        btn.addEventListener('click',()=>jumpToQuestion(btn.dataset.jumpQid));
      });
    }
    buildJumpListsInto(detailEl);
    buildJumpListsInto(footerDetailEl);
  }
}

function jumpToQuestion(qid){
  let target=document.querySelector(`[data-qid="${qid}"]`);
  if(!target) return;
  if(target.classList.contains('hidden')){
    const sb=document.getElementById('searchBox');
    if(sb.value){ sb.value=''; applyFilters(); recalculate(); }
    target=document.querySelector(`[data-qid="${qid}"]`);
  }
  if(!target || target.classList.contains('hidden')) return;
  const body=target.closest('.block-body');
  if(body && body.style.maxHeight==='0px'){
    body.style.maxHeight=(body.scrollHeight+200)+'px';
    const icon=body.previousElementSibling && body.previousElementSibling.querySelector('.toggle-icon');
    if(icon) icon.textContent='▲';
  }
  target.scrollIntoView({behavior:'smooth',block:'center'});
  target.style.transition='box-shadow .3s';
  target.style.boxShadow='0 0 0 3px rgba(239,68,68,.5)';
  setTimeout(()=>{target.style.boxShadow='';},1600);
}

// ── WEIGHT SUMMARY FOR PDF ────────────────────────────────────────
function buildWeightSummaryHTML(){
  const grouped={};
  Q.forEach(q=>{if(!grouped[q.b])grouped[q.b]=[];grouped[q.b].push(q);});
  const totalW=Q.reduce((s,q)=>s+q.w,0);
  const wh=L('weightTableHeaders');
  let html='';
  Object.entries(grouped).forEach(([block,list])=>{
    const bW=list.reduce((s,q)=>s+q.w,0),bPct=Math.round(bW/totalW*100);
    const blockDisplay=bLabel(block);
    html+=`<div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <strong style="font-size:11px;color:#714B67;min-width:160px">${blockDisplay}</strong>
        <div style="flex:1;background:#f3e8f0;border-radius:4px;height:8px;overflow:hidden">
          <div style="width:${bPct}%;background:#714B67;height:100%;border-radius:4px"></div></div>
        <span style="font-size:10px;color:#714B67;font-weight:bold;min-width:35px">${bPct}%</span>
        <span style="font-size:10px;color:#999">(${bW})</span>
      </div>
      <table style="width:100%;font-size:9px;border-collapse:collapse;margin-left:8px">
        <thead><tr style="background:#f8f4f7">${wh.map(h=>`<th style="padding:3px 5px;text-align:left;border:1px solid #e9e3ee">${h}</th>`).join('')}</tr></thead>
        <tbody>`;
    list.forEach(q=>{
      const qPct=(q.w/totalW*100).toFixed(1);
      const tc=q.t==='core'?'#1e40af':q.t==='maturity'?'#5b21b6':'#713f12';
      const tl=q.t==='core'?L('typeCore'):q.t==='maturity'?L('typeMaturity'):L('typeAspiration');
      html+=`<tr><td style="padding:3px 5px;border:1px solid #e9e3ee">${qText(q)}</td>
        <td style="padding:3px 5px;border:1px solid #e9e3ee;text-align:center;font-weight:bold">${q.w}</td>
        <td style="padding:3px 5px;border:1px solid #e9e3ee;text-align:center">${qPct}%</td>
        <td style="padding:3px 5px;border:1px solid #e9e3ee;text-align:center;color:${tc};font-size:8px">${tl}</td>
        <td style="padding:3px 5px;border:1px solid #e9e3ee;text-align:center;font-size:8px">${roleLabel(q.r)}</td>
        <td style="padding:3px 5px;border:1px solid #e9e3ee;text-align:center">${q.naRequired?L('weightYes'):L('weightNo')}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  html+=`<div style="margin-top:10px;padding:8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:5px;font-size:9px;color:#166534">${L('weightHowTo')}</div>`;
  return html;
}

  if(!confirm(L('confirmClear'))) return;
  localStorage.removeItem('oq360_autosave');
  document.getElementById('partnerName').value='';
  document.getElementById('partnerManager').value='';
  document.getElementById('roleMode').value='all';
  document.getElementById('searchBox').value='';
  renderForm(null); applyFilters(); recalculate();
});

// ── LANG TOGGLE (ES → EN → FR → ES) ──────────────────────────────
document.getElementById('langToggle').addEventListener('click',()=>{
  currentLang=LANGS[(LANGS.indexOf(currentLang)+1)%LANGS.length];
  const saved=loadAutosave();
  document.getElementById('searchBox').value=''; // clear search on lang change
  updateStaticUI();
  renderForm(saved?{answers:saved.answers||{},comments:saved.comments||{}}:null);
  applyFilters(); recalculate();
});

// ── FIELD EVENTS ──────────────────────────────────────────────────
document.getElementById('roleMode').addEventListener('change',()=>{applyFilters();recalculate();});
document.getElementById('searchBox').addEventListener('input',applyFilters);
document.getElementById('partnerName').addEventListener('input',()=>{scheduleAutosave();updateExportState();});
document.getElementById('partnerManager').addEventListener('input',()=>{scheduleAutosave();updateExportState();});

// ── PRINT PROTECTION (3 layers) ──────────────────────────────────
let printToastTimer=null;
let isExportingPDF=false; // suppress false-positive print warnings during legitimate PDF export
function showPrintBlockToast(){
  if(isExportingPDF) return; // don't warn the user during their own legitimate export
  const toast=document.getElementById('printBlockToast');
  toast.textContent='🚫 '+L('printBlockedMsg');
  toast.classList.remove('hidden');
  clearTimeout(printToastTimer);
  printToastTimer=setTimeout(()=>toast.classList.add('hidden'),4000);
}

// Layer 1: intercept Ctrl+P / Cmd+P keyboard shortcut
document.addEventListener('keydown', e=>{
  const isPrintShortcut = (e.ctrlKey||e.metaKey) && (e.key==='p'||e.key==='P');
  if(isPrintShortcut){
    e.preventDefault();
    e.stopPropagation();
    showPrintBlockToast();
  }
});

// Layer 2: block the browser context menu (right-click → Print, Save as, etc.)
// but NOT inside text inputs/textareas, so copy/paste/cut still works normally for the team.
document.addEventListener('contextmenu', e=>{
  const tag=(e.target.tagName||'').toLowerCase();
  const isEditable = tag==='input' || tag==='textarea' || e.target.isContentEditable;
  if(isEditable) return; // allow native context menu for copy/paste/cut inside fields
  e.preventDefault();
  showPrintBlockToast();
});

// Layer 3: if window.print() is somehow still triggered (devtools, browser menu, etc.),
// the @media print CSS rule renders a blank/blocked page instead of the form content.
// We also listen for the print events to show the toast as an extra signal.
window.addEventListener('beforeprint', ()=>{ showPrintBlockToast(); });

// ── INIT ──────────────────────────────────────────────────────────
const initSaved=loadAutosave();
if(initSaved&&initSaved.lang&&LANGS.includes(initSaved.lang)) currentLang=initSaved.lang;
if(initSaved){
  document.getElementById('partnerName').value=initSaved.partnerName||'';
  document.getElementById('partnerManager').value=initSaved.partnerManager||'';
  if(initSaved.roleMode) document.getElementById('roleMode').value=initSaved.roleMode;
}
updateStaticUI();
renderForm(initSaved);
applyFilters();
recalculate();
updateExportState();
</script>
</body>
